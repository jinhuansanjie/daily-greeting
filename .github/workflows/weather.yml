name: 天气预报（北京时间 07:30）

on:
  schedule:
    # 北京时间 07:30 = UTC 23:30（前一天）
    - cron: '30 23 * * *'
  workflow_dispatch:

jobs:
  send-weather:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout代码
      uses: actions/checkout@v3

    - name: 设置Python环境
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: 安装核心依赖
      run: |
        echo "安装核心依赖..."
        pip install langgraph langchain-core pydantic coze-coding-dev-sdk
        echo "核心依赖安装完成"

    - name: 发送天气预报
      run: |
        export PYTHONPATH=$PYTHONPATH:$(pwd):$(pwd)/src
        echo "开始发送天气预报..."
        python << 'EOF'
import sys
sys.path.insert(0, '/home/runner/work/daily-greeting/daily-greeting')
sys.path.insert(0, '/home/runner/work/daily-greeting/daily-greeting/src')

try:
    from src.graphs.graph import main_graph
    result = main_graph.invoke({'city': '苏州', 'trigger_type': 'weather'})
    print('发送状态:', result.get('send_status'))
    if result.get('send_status') == 'success':
        print('✓ 天气预报发送成功')
        sys.exit(0)
    else:
        print('✗ 天气预报发送失败')
        sys.exit(1)
except Exception as e:
    print('✗ 执行出错:', str(e))
    import traceback
    traceback.print_exc()
    sys.exit(1)
EOF
